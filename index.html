<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
        body {             
            background-image: url("./img/flores.jpg");
            background-repeat: no-repeat;
            background-position: center; 
            background-size: cover;
            background-attachment: fixed;
            margin: 0 auto;
            min-height: 100vh;          
            width: 100%;
            max-width: 1200px; 
            padding: 0 15px; 
            box-sizing: border-box;
        }

        h1 {
            font-size: clamp(28px, 5vw, 50px); 
            font-weight: bold;
            color: #c0202f;
            font-style: italic;   
            text-align: center;
            margin-top: 20px;
        }

        h4 {
          margin: 20px auto; 
          max-width: 800px; 
          font-size: clamp(16px, 2.2vw, 24px); 
          text-align: center; 
        }

        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;            
            align-items: center;
            margin-top: 30px;
            font-size: 18px;
            border: none; 
            padding: 0;
        }  
  </style>
  <title>JS - 6.5</title>
</head>
  
<body>
      
      <h1>Calculadora básica</h1>
      <p class="text-center text-amber-950 font-semibold text-lg md:text-xl mt-4 mb-8 max-w-xl mx-auto">       
          Crea un programa que solicite al usuario/a dos números y permita seleccionar una operación matemática (suma, resta, multiplicación o división). Al pulsar el botón, muestra el resultado de la operación por pantalla.</p>

      <fieldset class="container w-full">
        <p class="flex flex-col md:flex-row items-stretch md:items-center w-full md:w-11/12 lg:w-4/5 my-2 gap-3">
          
          <input id="num1" type="number" class="w-full md:flex-1 border-2 border-amber-800 bg-white rounded-lg pl-4 py-2" placeholder="escribe un número">
          
          <input id="num2" type="number" class="w-full md:flex-1 border-2 border-amber-800 bg-white rounded-lg pl-4 py-2" placeholder="escribe otro número">
          
          <select name="operacion" id="block" class="w-full md:flex-1 border-2 border-amber-800 bg-white rounded-lg pl-4 py-2 cursor-pointer">
            <option value="sum">suma</option>
            <option value="diff">resta</option>
            <option value="prod">multiplicación</option>
            <option value="qout">división</option>
          </select>
          
          <button onclick="result()" id="btn" class="border-2 bg-[#c0202f] rounded-lg text-amber-100 px-6 py-2 mt-5 text-xl md:text-2xl cursor-pointer hover:bg-amber-100 hover:text-[#c0202f] transition-colors">
            calcular
          </button>    
          
        </p>  
        
        <p id="responda" class="text-center text-xl bg-amber-100 text-[#c0202f] border-2 border-amber-950 rounded-lg md:rounded-none md:border-none md:bg-transparent md:text-3xl lg:text-[#c0202f] px-4 font-bold py-2 mt-5 empty:hidden""></p>
      </fieldset>
        
  <script src="./js/app.js"></script>
</body>
</html>
